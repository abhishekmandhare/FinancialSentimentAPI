<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Sentiment Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #232733;
            --border: #2e3345;
            --text: #e1e4ed;
            --text-dim: #8b8fa3;
            --green: #00c48c;
            --red: #ff5c5c;
            --yellow: #ffc542;
            --blue: #5b8def;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .status-dot.ok { background: var(--green); }
        .status-dot.err { background: var(--red); }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        /* Trending Table */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead {
            background: var(--surface2);
        }

        th {
            text-align: left;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-dim);
        }

        td {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
        }

        tbody tr {
            cursor: pointer;
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: var(--surface2);
        }

        .score {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .score.positive { color: var(--green); }
        .score.negative { color: var(--red); }
        .score.neutral { color: var(--yellow); }

        .delta {
            font-size: 0.8rem;
            font-weight: 500;
        }

        .delta.up { color: var(--green); }
        .delta.down { color: var(--red); }
        .delta.flat { color: var(--text-dim); }

        .direction-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .direction-badge.Bullish { background: rgba(0,196,140,0.15); color: var(--green); }
        .direction-badge.Bearish { background: rgba(255,92,92,0.15); color: var(--red); }
        .direction-badge.Neutral { background: rgba(255,197,66,0.15); color: var(--yellow); }

        /* Price column */
        .price-cell {
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .price-value {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .price-change {
            font-size: 0.75rem;
            margin-top: 2px;
        }

        .price-change.up { color: var(--green); }
        .price-change.down { color: var(--red); }
        .price-change.flat { color: var(--text-dim); }

        .sparkline-cell {
            padding: 8px 12px;
            width: 100px;
        }

        /* Detail Panel */
        .detail-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            display: none;
        }

        .detail-panel.visible { display: block; }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        .detail-header h2 {
            font-size: 1.1rem;
        }

        .close-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .close-btn:hover { background: var(--surface2); color: var(--text); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .stat-cell {
            background: var(--surface);
            padding: 14px 20px;
        }

        .stat-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .distribution-bar {
            display: flex;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .distribution-bar .pos { background: var(--green); }
        .distribution-bar .neu { background: var(--yellow); }
        .distribution-bar .neg { background: var(--red); }

        .history-list {
            padding: 16px 20px;
        }

        .history-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .history-item:last-child { border-bottom: none; }

        .history-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .history-time {
            color: var(--text-dim);
            font-size: 0.78rem;
        }

        .history-reasons {
            color: var(--text-dim);
            font-size: 0.78rem;
            margin-top: 2px;
        }

        .confidence-bar {
            display: inline-block;
            width: 40px;
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            margin-left: 8px;
            vertical-align: middle;
        }

        .confidence-bar .fill {
            height: 100%;
            border-radius: 2px;
            background: var(--blue);
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-dim);
        }

        .empty-state p {
            margin-top: 8px;
            font-size: 0.85rem;
        }

        .loading { opacity: 0.5; }

        .error-banner {
            background: rgba(255,92,92,0.1);
            border: 1px solid rgba(255,92,92,0.3);
            color: var(--red);
            padding: 10px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
        }

        .error-banner.visible { display: block; }

        @media (max-width: 600px) {
            header { padding: 12px 16px; }
            th, td { padding: 8px 10px; font-size: 0.82rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .sparkline-cell { display: none; }
            th.sparkline-header { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Financial Sentiment</h1>
        <div class="header-info">
            <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></span>
            <span id="lastUpdated"></span>
        </div>
    </header>

    <main>
        <div class="error-banner" id="errorBanner"></div>

        <!-- Detail Panel (shown on symbol click) -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <h2 id="detailSymbol">AAPL</h2>
                <button class="close-btn" onclick="closeDetail()">Close</button>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="history-list" id="historyList"></div>
        </div>

        <!-- Trending Table -->
        <p class="section-title">Trending Symbols (24h)</p>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Price</th>
                        <th class="sparkline-header">5D</th>
                        <th>Score</th>
                        <th>Prev</th>
                        <th>Delta</th>
                        <th>Direction</th>
                    </tr>
                </thead>
                <tbody id="trendingBody">
                    <tr><td colspan="7" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API = '';
        let refreshTimer;
        const priceCache = {};

        const SYMBOLS = {
            'AAPL':    'Apple Inc.',
            'MSFT':    'Microsoft Corp.',
            'GOOGL':   'Alphabet Inc.',
            'TSLA':    'Tesla Inc.',
            'NVDA':    'NVIDIA Corp.',
            'AMZN':    'Amazon.com Inc.',
            'META':    'Meta Platforms Inc.',
            'NFLX':    'Netflix Inc.',
            'AMD':     'Advanced Micro Devices',
            'INTC':    'Intel Corp.',
            'JPM':     'JPMorgan Chase & Co.',
            'BAC':     'Bank of America Corp.',
            'SPY':     'S&P 500 ETF',
            'QQQ':     'Nasdaq-100 ETF',
            'BTC-USD': 'Bitcoin',
        };

        function symbolName(sym) {
            return SYMBOLS[sym] || sym;
        }

        // -- Stock Price Fetching -----------------------------------------

        async function fetchStockPrice(symbol) {
            try {
                const url = `${API}/api/prices/${encodeURIComponent(symbol)}/chart?range=5d&interval=1h`;
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                const result = data.chart.result;
                if (!result || !result.length) return null;

                const meta = result[0].meta;
                const closes = result[0].indicators.quote[0].close;
                // Filter out null values
                const validCloses = closes.filter(c => c !== null && c !== undefined);
                if (!validCloses.length) return null;

                const currentPrice = meta.regularMarketPrice;
                const previousClose = meta.chartPreviousClose || meta.previousClose;
                const change = previousClose ? currentPrice - previousClose : 0;
                const changePercent = previousClose ? (change / previousClose) * 100 : 0;

                return {
                    price: currentPrice,
                    change: change,
                    changePercent: changePercent,
                    sparklineData: validCloses
                };
            } catch (e) {
                return null;
            }
        }

        async function fetchAllPrices(symbols) {
            const promises = symbols.map(async (sym) => {
                const data = await fetchStockPrice(sym);
                if (data) {
                    priceCache[sym] = data;
                }
            });
            await Promise.allSettled(promises);
        }

        // -- Sparkline SVG ------------------------------------------------

        function createSparklineSvg(data, isPositive) {
            if (!data || data.length < 2) return '';

            const width = 80;
            const height = 28;
            const padding = 2;

            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;

            const points = data.map((val, i) => {
                const x = padding + (i / (data.length - 1)) * (width - 2 * padding);
                const y = padding + (1 - (val - min) / range) * (height - 2 * padding);
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            });

            const color = isPositive ? '#00c48c' : '#ff5c5c';
            const gradientId = 'sg' + Math.random().toString(36).substring(2, 8);

            // Create fill area path
            const firstPoint = points[0];
            const lastPoint = points[points.length - 1];
            const lastX = parseFloat(lastPoint.split(',')[0]);
            const firstX = parseFloat(firstPoint.split(',')[0]);

            return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="${gradientId}" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
                        <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
                    </linearGradient>
                </defs>
                <polygon points="${points.join(' ')} ${lastX},${height} ${firstX},${height}" fill="url(#${gradientId})"/>
                <polyline points="${points.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
        }

        // -- Trending -----------------------------------------------------

        async function loadTrending() {
            try {
                const res = await fetch(`${API}/api/sentiment/trending?hours=24&limit=20`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                setStatus(true);
                renderTrending(data);
                // Fetch prices in the background, then update the table
                const symbols = data.map(t => t.symbol);
                fetchAllPrices(symbols).then(() => updatePriceCells(data));
            } catch (e) {
                setStatus(false);
                showError(`Failed to load trending data: ${e.message}`);
            }
        }

        function renderTrending(items) {
            const tbody = document.getElementById('trendingBody');
            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state"><p>No sentiment data yet.</p><p>The ingestion pipeline will populate this automatically.</p></td></tr>';
                return;
            }
            tbody.innerHTML = items.map(t => {
                const scoreClass = t.currentAvgScore > 0.1 ? 'positive' : t.currentAvgScore < -0.1 ? 'negative' : 'neutral';
                const deltaClass = t.delta > 0.01 ? 'up' : t.delta < -0.01 ? 'down' : 'flat';
                const deltaSign = t.delta > 0 ? '+' : '';
                const cached = priceCache[t.symbol];
                const priceHtml = cached ? formatPriceCell(cached) : '<span style="color:var(--text-dim)">&mdash;</span>';
                const sparkHtml = cached ? createSparklineSvg(cached.sparklineData, cached.change >= 0) : '';
                return `<tr onclick="openDetail('${t.symbol}')">
                    <td><strong>${t.symbol}</strong><br><span style="font-size:0.75rem;color:var(--text-dim);font-weight:normal">${symbolName(t.symbol)}</span></td>
                    <td class="price-cell" data-price-symbol="${t.symbol}">${priceHtml}</td>
                    <td class="sparkline-cell" data-sparkline-symbol="${t.symbol}">${sparkHtml}</td>
                    <td class="score ${scoreClass}">${t.currentAvgScore.toFixed(3)}</td>
                    <td class="score" style="color:var(--text-dim)">${t.previousAvgScore.toFixed(3)}</td>
                    <td class="delta ${deltaClass}">${deltaSign}${t.delta.toFixed(3)}</td>
                    <td><span class="direction-badge ${t.direction}">${t.direction}</span></td>
                </tr>`;
            }).join('');
        }

        function formatPriceCell(data) {
            const changeClass = data.change > 0.005 ? 'up' : data.change < -0.005 ? 'down' : 'flat';
            const changeSign = data.change > 0 ? '+' : '';
            const priceStr = data.price >= 1000 ? data.price.toFixed(0) : data.price >= 1 ? data.price.toFixed(2) : data.price.toFixed(4);
            return `<div class="price-value">$${priceStr}</div>
                    <div class="price-change ${changeClass}">${changeSign}${data.changePercent.toFixed(2)}%</div>`;
        }

        function updatePriceCells(items) {
            items.forEach(t => {
                const cached = priceCache[t.symbol];
                if (!cached) return;

                const priceCell = document.querySelector(`[data-price-symbol="${t.symbol}"]`);
                if (priceCell) {
                    priceCell.innerHTML = formatPriceCell(cached);
                }

                const sparkCell = document.querySelector(`[data-sparkline-symbol="${t.symbol}"]`);
                if (sparkCell) {
                    sparkCell.innerHTML = createSparklineSvg(cached.sparklineData, cached.change >= 0);
                }
            });
        }

        // -- Detail Panel -------------------------------------------------

        async function openDetail(symbol) {
            const panel = document.getElementById('detailPanel');
            document.getElementById('detailSymbol').innerHTML = `${symbol} <span style="font-size:0.85rem;color:var(--text-dim);font-weight:normal;margin-left:8px">${symbolName(symbol)}</span>`;
            document.getElementById('statsGrid').innerHTML = '<div class="stat-cell"><span class="stat-label">Loading...</span></div>';
            document.getElementById('historyList').innerHTML = '';
            panel.classList.add('visible');
            panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

            const [stats, history] = await Promise.allSettled([
                fetch(`${API}/api/sentiment/${symbol}/stats?days=30`).then(r => r.ok ? r.json() : null),
                fetch(`${API}/api/sentiment/${symbol}/history?page=1&pageSize=15`).then(r => r.ok ? r.json() : null)
            ]);

            if (stats.status === 'fulfilled' && stats.value) renderStats(stats.value);
            else document.getElementById('statsGrid').innerHTML = '<div class="stat-cell"><span class="stat-label">No stats available</span></div>';

            if (history.status === 'fulfilled' && history.value) renderHistory(history.value.items);
            else document.getElementById('historyList').innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;">No history available</p>';
        }

        function renderStats(s) {
            const scoreClass = s.averageScore > 0.1 ? 'positive' : s.averageScore < -0.1 ? 'negative' : 'neutral';
            const trendColor = s.trend.direction === 'Improving' ? 'var(--green)' :
                               s.trend.direction === 'Deteriorating' ? 'var(--red)' : 'var(--text-dim)';

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-cell">
                    <div class="stat-label">Avg Score</div>
                    <div class="stat-value score ${scoreClass}">${s.averageScore.toFixed(3)}</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Latest Score</div>
                    <div class="stat-value">${s.latestScore.toFixed(3)}</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Analyses</div>
                    <div class="stat-value">${s.totalAnalyses}</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Confidence</div>
                    <div class="stat-value">${(s.averageConfidence * 100).toFixed(0)}%</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Trend</div>
                    <div class="stat-value" style="color:${trendColor}">${s.trend.direction}</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Distribution</div>
                    <div style="font-size:0.75rem;color:var(--text-dim);margin-bottom:4px;">
                        ${s.distribution.positivePercent.toFixed(0)}% / ${s.distribution.neutralPercent.toFixed(0)}% / ${s.distribution.negativePercent.toFixed(0)}%
                    </div>
                    <div class="distribution-bar">
                        <div class="pos" style="width:${s.distribution.positivePercent}%"></div>
                        <div class="neu" style="width:${s.distribution.neutralPercent}%"></div>
                        <div class="neg" style="width:${s.distribution.negativePercent}%"></div>
                    </div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Highest</div>
                    <div class="stat-value score positive">${s.highestScore.score.toFixed(3)}</div>
                    <div style="font-size:0.7rem;color:var(--text-dim)">${formatDate(s.highestScore.date)}</div>
                </div>
                <div class="stat-cell">
                    <div class="stat-label">Lowest</div>
                    <div class="stat-value score negative">${s.lowestScore.score.toFixed(3)}</div>
                    <div style="font-size:0.7rem;color:var(--text-dim)">${formatDate(s.lowestScore.date)}</div>
                </div>
            `;
        }

        function renderHistory(items) {
            const list = document.getElementById('historyList');
            if (!items || !items.length) {
                list.innerHTML = '<p style="color:var(--text-dim);font-size:0.85rem;padding:12px 0;">No history entries</p>';
                return;
            }
            list.innerHTML = '<p class="section-title" style="margin-top:4px;">Recent Analyses</p>' +
                items.map(h => {
                    const scoreClass = h.score > 0.1 ? 'positive' : h.score < -0.1 ? 'negative' : 'neutral';
                    const confWidth = Math.round(h.confidence * 100);
                    return `<div class="history-item">
                        <div class="history-top">
                            <span>
                                <span class="score ${scoreClass}">${h.score.toFixed(3)}</span>
                                <span style="color:var(--text-dim);font-size:0.78rem;margin-left:6px;">${h.label}</span>
                                <span class="confidence-bar"><span class="fill" style="width:${confWidth}%"></span></span>
                            </span>
                            <span class="history-time">${formatDate(h.analyzedAt)}</span>
                        </div>
                        ${h.keyReasons && h.keyReasons.length ? `<div class="history-reasons">${h.keyReasons.join(' &middot; ')}</div>` : ''}
                    </div>`;
                }).join('');
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('visible');
        }

        // -- Helpers ------------------------------------------------------

        function setStatus(ok) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
            txt.textContent = ok ? 'Connected' : 'Disconnected';
            if (ok) {
                document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();
                hideError();
            }
        }

        function showError(msg) {
            const el = document.getElementById('errorBanner');
            el.textContent = msg;
            el.classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorBanner').classList.remove('visible');
        }

        function formatDate(iso) {
            const d = new Date(iso);
            const now = new Date();
            const diffMs = now - d;
            const diffMin = Math.floor(diffMs / 60000);
            if (diffMin < 1) return 'just now';
            if (diffMin < 60) return `${diffMin}m ago`;
            const diffH = Math.floor(diffMin / 60);
            if (diffH < 24) return `${diffH}h ago`;
            return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // -- Init ---------------------------------------------------------

        loadTrending();
        refreshTimer = setInterval(loadTrending, 30000);
    </script>
</body>
</html>
