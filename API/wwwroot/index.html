<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Sentiment Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header>
        <h1>Financial Sentiment</h1>
        <div class="header-info">
            <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connecting...</span></span>
            <span id="lastUpdated"></span>
        </div>
    </header>

    <nav class="nav-tabs">
        <button class="nav-tab active" data-page="dashboard" onclick="switchPage('dashboard')">Dashboard</button>
        <button class="nav-tab" data-page="admin" onclick="switchPage('admin')">Admin</button>
    </nav>

    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page active">
        <main>
            <div class="error-banner" id="errorBanner"></div>

            <!-- Detail Panel (shown on symbol click) -->
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <h2 id="detailSymbol">AAPL</h2>
                    <button class="close-btn" onclick="closeDetail()">Close</button>
                </div>
                <div class="stats-grid" id="statsGrid"></div>
                <div class="trend-chart-section" id="trendChartSection" style="display:none;">
                    <p class="section-title">30-Day Sentiment Trend</p>
                    <div class="trend-chart-container" id="trendChartContainer"></div>
                </div>
                <div class="price-chart-section" id="priceChartSection" style="display:none;">
                    <p class="section-title">Price History (Same Period)</p>
                    <div class="price-chart-container" id="priceChartContainer"></div>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>

            <!-- Trending Table -->
            <p class="section-title">Trending Symbols (24h)</p>
            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th data-sort="symbol" onclick="toggleSort('symbol')" style="cursor:pointer">Symbol<span class="sort-indicator"></span></th>
                            <th>Price</th>
                            <th class="sparkline-header">5D</th>
                            <th data-sort="score" onclick="toggleSort('score')" style="cursor:pointer">Score<span class="sort-indicator"></span></th>
                            <th data-sort="delta" onclick="toggleSort('delta')" style="cursor:pointer">Trend<span class="sort-indicator"> &#9660;</span></th>
                            <th data-sort="dispersion" onclick="toggleSort('dispersion')" style="cursor:pointer">Dispersion<span class="sort-indicator"></span></th>
                            <th data-sort="articles" onclick="toggleSort('articles')" style="cursor:pointer">Articles<span class="sort-indicator"></span></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="trendingBody">
                        <tr><td colspan="8" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Admin Page -->
    <div id="page-admin" class="page">
        <main>
            <p class="section-title">System Statistics</p>
            <div id="adminContent">
                <div class="admin-loading">Loading system stats...</div>
            </div>
        </main>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // -- Page Navigation ------------------------------------------
        let currentPage = 'dashboard';

        function switchPage(page) {
            if (page === currentPage) return;

            // Deactivate current
            document.getElementById('page-' + currentPage).classList.remove('active');
            document.querySelector('.nav-tab[data-page="' + currentPage + '"]').classList.remove('active');

            // Activate new
            document.getElementById('page-' + page).classList.add('active');
            document.querySelector('.nav-tab[data-page="' + page + '"]').classList.add('active');

            // Manage timers per page
            if (currentPage === 'admin') stopAdmin();

            currentPage = page;

            if (page === 'admin') initAdmin();
        }

        // -- Init -----------------------------------------------------
        initDashboard();
    </script>
</body>
</html>
